# order-service-local.yml
spring:
  config:
    activate:
      on-profile: local

  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: admin
    password: admin

  datasource:
    url: 'jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1'
    username: sa
    password:
    driver-class-name: org.h2.Driver

---
# order-service-dev.yml
spring:
  config:
    activate:
      on-profile: dev

  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: admin
    password: admin

